    // Поэтому добавляем недостающие данные автоматически.
    state.boList = defaultState.boList;

    // Исправление сломанных картинок: старые ссылки imgur заменяются на встроенные SVG-логотипы

      if(org.short === 'ПЧ') org.logo = 'fire';
      if(org.short === 'МЦЛС') org.logo = 'med';
      if(org.short === 'МЦЛВ') org.logo = 'hospital';

    // Если в старом сохранении нет массива заместителей — создаём 3 пустых слота.

      if(!Array.isArray(org.deputies)) org.deputies = ['-','-','-'];
      while(org.deputies.length < 3) org.deputies.push('-');
    });

    if(!state.exchangeRequests) state.exchangeRequests = [];
    if(!state.logs) state.logs = [];
    if(!state.staffApplications) state.staffApplications = [];
    if(!state.registeredUsers) state.registeredUsers = [];
    if(!state.passwordOverrides) state.passwordOverrides = {};

    function daysPassed(date){
      const startDate = new Date(date);
      const currentDate = new Date();
      const difference = currentDate.getTime() - startDate.getTime();
      let days = Math.floor(difference / (1000 * 60 * 60 * 24));
      if(days < 0) days = 0;
      if(days > 30) days = 30;
      return days;
    }

    function setWarnDeadline(org){
      if(org.reprimands >= 3 && !org.warnDeadline){
        org.warnDeadline = Date.now() + 24 * 60 * 60 * 1000;
      }
      if(org.reprimands < 3){
        org.warnDeadline = null;
      }
    }

    function formatWarnTime(org){
      if(!org.warnDeadline) return '';
      const left = org.warnDeadline - Date.now();
      if(left <= 0) return '00:00:00';
      const h = Math.floor(left / (1000 * 60 * 60));
      const m = Math.floor((left % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((left % (1000 * 60)) / 1000);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function login(){
      const login=document.getElementById('login').value.trim();
      const pass=document.getElementById('pass').value.trim();

      const pendingApplication = state.staffApplications.find(a =>
        a.nick.toLowerCase() === login.toLowerCase() &&
        a.password === pass &&
        a.status === 'На рассмотрении'
      );

      if(pendingApplication){
        return notify('Ваши данные на обработке. Ожидайте рассмотрения анкеты');
      }

      const deniedApplication = state.staffApplications.find(a =>
        a.nick.toLowerCase() === login.toLowerCase() &&
        a.password === pass &&
        a.status === 'Отказано'
      );

      if(deniedApplication){
        return notify('Ваша заявка была отклонена');
      }

      const allUsers = [...users, ...state.registeredUsers];
      const user=allUsers.find(u=>u.login===login && ((state.passwordOverrides && state.passwordOverrides[u.login]) || u.pass)===pass);

      if(!user) return notify('Неверный ник или пароль');

      state.user=user;
      state.tab='orgs';
      save();
      render();
    }

    function confirmPasswordReset(){
      if(!resetData) return notify('Сначала получите код');
      if(Date.now()>resetData.expires) return notify('Код устарел, получите новый');

      const code=document.getElementById('resetCode').value.trim();
      const pass1=document.getElementById('newPass1').value.trim();
      const pass2=document.getElementById('newPass2').value.trim();

      if(code!==resetData.code) return notify('Неверный код');
      if(!pass1 || !pass2) return notify('Введите новый пароль два раза');
      if(pass1!==pass2) return notify('Пароли не совпадают');
      if(!isStrongPassword(pass1)) return notify('Пароль слишком лёгкий');

      const regUser=state.registeredUsers.find(u=>u.login.toLowerCase()===resetData.login.toLowerCase());
      if(regUser){
        regUser.pass=pass1;
      } else {
        state.passwordOverrides[resetData.login]=pass1;
      }

      state.logs.unshift(`Восстановлен пароль для аккаунта ${resetData.login}`);
      resetData=null;
      save();
      notify('Пароль успешно изменён');
      loginScreen();
    }

    function isStrongPassword(pass){
      const hasUpper = Array.from(pass).some(ch => ch >= 'A' && ch <= 'Z' || ch >= 'А' && ch <= 'Я');
      const hasLower = Array.from(pass).some(ch => ch >= 'a' && ch <= 'z' || ch >= 'а' && ch <= 'я');
      const hasDigit = Array.from(pass).some(ch => ch >= '0' && ch <= '9');
      const hasSpecial = Array.from(pass).some(ch => !((ch >= 'A' && ch <= 'Z') || (ch >= 'a' && ch <= 'z') || (ch >= 'А' && ch <= 'Я') || (ch >= 'а' && ch <= 'я') || (ch >= '0' && ch <= '9')));
      return pass.length >= 8 && hasUpper && hasLower && hasDigit && hasSpecial;
    }

    function sendStaffApplication(){
      const nick=document.getElementById('regNick').value.trim();
      const contact=document.getElementById('regVk').value.trim();
      const pass1=document.getElementById('regPass1').value.trim();
      const pass2=document.getElementById('regPass2').value.trim();
      const org=document.getElementById('regOrg').value;
      const type=document.getElementById('regType').value;
      const comment='';
      const allUsers=[...users,...state.registeredUsers];

      if(!nick || !contact) return notify('Заполни ник и связь');
      if(allUsers.some(u=>u.login.toLowerCase()===nick.toLowerCase())) return notify('Такой ник уже зарегистрирован');
      if(state.staffApplications.some(a=>a.nick.toLowerCase()===nick.toLowerCase() && a.status==='На рассмотрении')) return notify('Заявка с таким ником уже на рассмотрении');
      if(!pass1 || !pass2) return notify('Введите пароль два раза');
      if(pass1 !== pass2) return notify('Пароли не совпадают');
      if(!isStrongPassword(pass1)) return notify('Пароль слишком лёгкий');

      state.staffApplications.unshift({
        id:Date.now(),nick,contact,password:pass1,org,type,comment,
        status:'На рассмотрении',date:new Date().toLocaleString('ru-RU')
      });
      state.logs.unshift(`${nick} отправил заявку на ${type}: ${org}`);
      save();
      notify('Заявка отправлена. После одобрения можно будет войти');
      loginScreen();
    }

    function approveStaffApplication(id){
      const r=state.staffApplications.find(x=>x.id===id);if(!r)return;
      if(!canReviewStaffApplication(r.type)) return notify('Нет доступа к этой заявке');
      const org=state.orgs.find(o=>o.name===r.org);if(!org)return;
      if(r.type==='Лидер') org.leader=r.nick;
      if(r.type==='Заместитель'){
        const emptySlot=org.deputies.findIndex(d=>d==='-' || !d);
        const slot=emptySlot>=0 ? emptySlot : 0;
        org.deputies[slot]=r.nick;
      }
      r.status='Одобрено';

      const newUser={
        login:r.nick,
        pass:r.password,
        role:r.type,
        name:r.nick,
        org:r.org,
        email:r.contact
      };

      if(!state.registeredUsers.some(u=>u.login.toLowerCase()===r.nick.toLowerCase())){
        state.registeredUsers.push(newUser);
      }

      state.logs.unshift(`${state.user.name} одобрил заявку ${r.nick} на ${r.type} в ${r.org}. Аккаунт создан.`);
      save();notify('Заявка одобрена');render();
    }

    function denyStaffApplication(id){
      const r=state.staffApplications.find(x=>x.id===id);if(!r)return;
      if(!canReviewStaffApplication(r.type)) return notify('Нет доступа к этой заявке');
      r.status='Отказано';
      state.logs.unshift(`${state.user.name} отказал заявку ${r.nick} на ${r.type} в ${r.org}`);
      save();notify('Заявка отказана');render();
    }

    function makeStaticEditable(login){
      const base = users.find(u=>u.login.toLowerCase()===login.toLowerCase());
      if(!base) return null;
      const existing = state.registeredUsers.find(u=>u.login.toLowerCase()===login.toLowerCase());
      if(existing) return existing;
      const copy = {...base};
      state.registeredUsers.push(copy);
      return copy;
    }

    function developerDeleteByLogin(login){

    function removeDeveloperAccount(){
      if(!isDeveloper()) return notify('Нет доступа');

      const login=document.getElementById('removeLogin').value.trim();
      if(!login) return notify('Введите логин или ник из заявки');

      const normalizedLogin = login.toLowerCase();

      const regIndex=state.registeredUsers.findIndex(u=>
        u.login.toLowerCase()===normalizedLogin ||
        u.name.toLowerCase()===normalizedLogin
      );

      const staticUser=users.find(u=>
        u.login.toLowerCase()===normalizedLogin ||
        u.name.toLowerCase()===normalizedLogin
      );

      const beforeAppsCount = state.staffApplications.length;

      // Удаляем ВСЕ заявки этого ника, даже если аккаунт уже не найден
      state.staffApplications = state.staffApplications.filter(a =>
        a.nick.toLowerCase() !== normalizedLogin
      );

      const removedAppsCount = beforeAppsCount - state.staffApplications.length;

      // Удаляем аккаунт, если он создан через регистрацию/Developer
      let removedAccountName = login;
      if(regIndex !== -1){
        removedAccountName = state.registeredUsers[regIndex].login;
        state.registeredUsers.splice(regIndex,1);
      }

      // Если он был лидером или заместителем — убираем его из организации
      state.orgs.forEach(org => {
        if(org.leader && org.leader.toLowerCase() === normalizedLogin){
          org.leader='Не назначен';
        }
        org.deputies = org.deputies.map(dep =>
          dep && dep.toLowerCase() === normalizedLogin ? '-' : dep
        );
      });

      // Если ничего не найдено вообще
      if(regIndex === -1 && !staticUser && removedAppsCount === 0){
        return notify('Аккаунт или заявка не найдены');
      }

      // Статичные тестовые аккаунты удалить из кода нельзя, но можно убрать их заявки/должность
      if(staticUser){
        state.logs.unshift(`Разработчик очистил данные тестового аккаунта ${staticUser.login}`);
        notify('Тестовый аккаунт нельзя удалить из кода, но заявки и должность очищены');
      } else {
        state.logs.unshift(`Разработчик полностью удалил ${removedAccountName}: аккаунт, заявки и должность`);
        notify('Аккаунт, заявки и должность удалены');
      }

      save();
      render();
    }

            <option value="2">Заместитель 3</option>
          </select>
          <input id="newDeputy" class="field" placeholder="Ник нового заместителя">
          <button class="btn-green" onclick="setDeputy()">Поставить заместителя</button>
          <button class="btn-red" onclick="removeDeputy()">Снять заместителя</button>
        </div>
      ` : '';

      return `
        <div class="panel"><button class="btn-red" onclick="lockAdminPanel()">Закрыть панель управления</button></div>
        <div class="panel">
          <h2>Панель управления следящего</h2>
          <p class="muted">При одобрении заявления баллы автоматически начисляются нужной организации.</p><br>
          <button onclick="setTab('staffApps')">Открыть заявки на лидера / заместителя</button>
        </div>
        ${requestsHtml}
        <div class="panel"><h2>Заявки на обмен баллов</h2>${exchangeHtml}</div>
        <div class="panel">
          <h2>Ручная выдача</h2>
          <select id="aOrg" class="field">${state.orgs.map(o => `<option>${o.name}</option>`).join('')}</select>
          <input id="aPoints" class="field" type="number" placeholder="Количество баллов">
          <button onclick="manualPoints(1)">Выдать баллы</button>
          <button class="btn-red" onclick="manualPoints(-1)">Снять баллы</button>
          <button class="btn-yellow" onclick="giveWarn('oral')">Выдать устный</button>
          <button class="btn-red" onclick="giveWarn('rep')">Выдать выговор</button>
          <button class="btn-light" onclick="removeWarn('oral')">Снять устный</button>
          <button class="btn-light" onclick="removeWarn('rep')">Снять выговор</button>
        </div>
        ${staffManageHtml}
      `;
    }

    function approve(id){const r=state.requests.find(x=>x.id===id);if(!r)return;const o=state.orgs.find(x=>x.name===r.org);o.points=Math.min(o.max,o.points+r.points);r.status='Одобрено';state.logs.unshift(`Следящий одобрил БО: ${r.org} +${r.points}`);save();notify('Заявление одобрено, баллы начислены');render()}
    function deny(id){const r=state.requests.find(x=>x.id===id);if(!r)return;r.status='Отказано';state.logs.unshift(`Следящий отказал БО: ${r.nick}`);save();notify('Заявление отказано');render()}
    function manualPoints(sign){const o=state.orgs.find(x=>x.name===aOrg.value);const p=+aPoints.value;if(!p)return notify('Укажи баллы');o.points=Math.max(0,Math.min(o.max,o.points+p*sign));state.logs.unshift(`${sign>0?'Выдано':'Снято'} ${p} баллов: ${o.name}`);save();render()}

    function setLeader(){
      if(!canManageStaff()) return notify('Нет доступа к управлению лидерами');
      const o=state.orgs.find(x=>x.name===staffOrg.value);
      const nick=newLeader.value.trim();
      if(!nick) return notify('Укажи ник лидера');
      o.leader=nick;
      state.logs.unshift(`${state.user.name} поставил лидера ${nick} в ${o.name}`);
      save();notify('Лидер поставлен');render();
    }

    function removeLeader(){
      if(!canManageStaff()) return notify('Нет доступа к управлению лидерами');
      const o=state.orgs.find(x=>x.name===staffOrg.value);
      state.logs.unshift(`${state.user.name} снял лидера ${o.leader} из ${o.name}`);
      o.leader='Не назначен';
      save();notify('Лидер снят');render();
    }

    function setDeputy(){
      if(!canManageStaff()) return notify('Нет доступа к управлению заместителями');
      const o=state.orgs.find(x=>x.name===staffOrg.value);
      const slot=Number(depSlot.value);
      const nick=newDeputy.value.trim();
      if(!nick) return notify('Укажи ник заместителя');
      o.deputies[slot]=nick;
      state.logs.unshift(`${state.user.name} поставил заместителя ${nick} в ${o.name}`);
      save();notify('Заместитель поставлен');render();
    }

    function removeDeputy(){
      if(!canManageStaff()) return notify('Нет доступа к управлению заместителями');
      const o=state.orgs.find(x=>x.name===staffOrg.value);
      const slot=Number(depSlot.value);
      state.logs.unshift(`${state.user.name} снял заместителя ${o.deputies[slot]} из ${o.name}`);
      o.deputies[slot]='-';
      save();notify('Заместитель снят');render();
    }
    function giveWarn(type){
      const o=state.orgs.find(x=>x.name===aOrg.value);
      if(type==='oral'){
        o.oral=Math.min(3,o.oral+1);
        state.logs.unshift(`Выдан устный выговор: ${o.name}`);
        if(o.oral>=3){
          o.oral=0;
          o.reprimands=Math.min(3,o.reprimands+1);
          setWarnDeadline(o);
          state.logs.unshift(`Автоматически выдан выговор за 3 устных: ${o.name}`);
          notify('Организация получила 3 устных — автоматически выдан выговор');
        }
      } else {
        o.reprimands=Math.min(3,o.reprimands+1);
        setWarnDeadline(o);
        state.logs.unshift(`Выдан выговор: ${o.name}`);
      }
      save();render();
    }

    function removeWarn(type){
      const o=state.orgs.find(x=>x.name===aOrg.value);
      if(type==='oral'){
        if(o.oral<=0) return notify('У организации нет устных для снятия');
        o.oral=Math.max(0,o.oral-1);
        state.logs.unshift(`Снят устный выговор: ${o.name}`);
        notify('Устный выговор снят');
      } else {
        if(o.reprimands<=0) return notify('У организации нет выговоров для снятия');
        o.reprimands=Math.max(0,o.reprimands-1);
        setWarnDeadline(o);
        state.logs.unshift(`Снят выговор: ${o.name}`);
        notify('Выговор снят');
      }
      save();render();
    }

    function exchangePage(){
      const myOrg = getMyOrg();
      const orgOptions = canAdmin() ? state.orgs : state.orgs.filter(o=>o.name===state.user.org);
      const items = [
        {icon:'💰',cost:1,title:'1.500.000$',type:'money'},
        {icon:'🟨',cost:3,title:'Снять устный выговор',type:'oral'},
        {icon:'🟥',cost:5,title:'Снять строгий выговор',type:'rep'},
        {icon:'⭐',cost:10,title:'Индивидуальное задание',type:'task'}
      ];
      return `<div class="panel"><h2>Обмен баллов</h2><p class="muted">Лидер или заместитель отправляет заявку на обмен баллов своей организации. Следящий принимает или отказывает в админ-панели.</p>
      ${myOrg ? `<div class="mini-stat">Ваша организация: <b>${myOrg.name}</b><br>Доступно баллов: <b>${myOrg.points}/${myOrg.max}</b></div>` : ''}
      </div>
      <div class="shop">${items.map(x=>`<div class="shop-card"><div class="big">${x.icon}</div><h2>${x.cost} балл.</h2><p>${x.title}</p><br>${canAdmin()?`<select id="exOrg_${x.type}" class="field">${orgOptions.map(o=>`<option>${o.name}</option>`).join('')}</select>`:''}<button onclick="exchange('${x.title}',${x.cost},'${x.type}')">Отправить заявку</button></div>`).join('')}</div>
      <div class="panel" style="margin-top:18px"><h2>Мои заявки на обмен</h2>${state.exchangeRequests.filter(r=>canAdmin()||r.author===state.user.name||r.org===state.user.org).map(exchangeReqView).join('')||'<p class="muted">Заявок пока нет</p>'}</div>`
    }
    function exchange(item,cost,type){
      const orgName = canAdmin() ? document.getElementById('exOrg_'+type).value : state.user.org;
      const org = state.orgs.find(o=>o.name===orgName);
      if(!org) return notify('Организация не найдена');
      if(org.points < cost) return notify('Недостаточно баллов для обмена');
      const req={id:Date.now(),org:orgName,author:state.user.name,item,cost,type,status:'На рассмотрении',date:new Date().toLocaleString('ru-RU')};
      state.exchangeRequests.unshift(req);
      state.logs.unshift(`${state.user.name} отправил заявку на обмен: ${orgName} — ${item} за ${cost} балл.`);
      save();notify('Заявка на обмен отправлена');render();
    }

    function approveExchange(id){
      const r=state.exchangeRequests.find(x=>x.id===id);if(!r)return;
      const org=state.orgs.find(o=>o.name===r.org);if(!org)return;
      if(org.points < r.cost) return notify('Недостаточно баллов у организации');
      org.points=Math.max(0,org.points-r.cost);
      if(r.type==='oral') org.oral=Math.max(0,org.oral-1);
      if(r.type==='rep') org.reprimands=Math.max(0,org.reprimands-1);
      setWarnDeadline(org);
      r.status='Одобрено';
      state.logs.unshift(`Следящий одобрил обмен: ${r.org} — ${r.item}, списано ${r.cost} балл.`);
      save();notify('Обмен одобрен, баллы списаны');render();
    }
    function denyExchange(id){const r=state.exchangeRequests.find(x=>x.id===id);if(!r)return;r.status='Отказано';state.logs.unshift(`Следящий отказал обмен: ${r.org} — ${r.item}`);save();notify('Заявка на обмен отказана');render()} 

    function boPage(){
      return `<div class="panel"><h2>Список БО</h2><p class="muted">Задания для получения баллов организациями.</p>
      <div class="bo-search">
        <input id="boSearch" class="field" placeholder="Поиск по пункту, заданию, КД или примечанию" oninput="renderBoTable()">
        <select id="boFilter" class="field" onchange="renderBoTable()">
          <option value="all">🏥🚒 Все организации</option>
          <option value="МЗ">🏥 Министерство здравоохранения</option>
          <option value="ПЧ">🚒 Пожарный департамент</option>
        </select>
      </div>
      <div id="boTableBox" style="overflow:auto;margin-top:18px"></div>
      </div>`
    }

    function renderBoTable(){
      const box=document.getElementById('boTableBox');
      if(!box) return;
      const query=(document.getElementById('boSearch')?.value || '').toLowerCase().trim();
      const filter=document.getElementById('boFilter')?.value || 'all';
      const list=state.boList.filter(item=>{
        const matchesFilter = filter==='all' || item.id.startsWith(filter);
        const text=`${item.id} ${item.task} ${item.points} ${item.cooldown} ${item.note}`.toLowerCase();
        return matchesFilter && (!query || text.includes(query));
      });
      box.innerHTML=`
      <div class="bo-table">
      <table style="width:100%;border-collapse:collapse">
      <tr class="bo-head">
      <th style="padding:12px;text-align:left">Пункт БО</th>
      <th style="padding:12px;text-align:left">Задание</th>
      <th style="padding:12px;text-align:center">Баллы</th>
      <th style="padding:12px;text-align:center">КД</th>
      <th style="padding:12px;text-align:left">Примечание</th>
      </tr>
      ${list.length ? list.map(item=>`
      <tr style="border-bottom:1px solid #dce5f0;background:white">
      <td style="padding:14px;font-weight:800">${item.id.startsWith('ПЧ') ? `<span class="bo-id fire">🚒 ${item.id}</span>` : `<span class="bo-id med">🏥 ${item.id}</span>`}</td>
      <td style="padding:12px">${item.task}</td>
      <td style="padding:12px;text-align:center"><span class="bo-points">${item.points}</span></td>
      <td style="padding:12px;text-align:center"><span class="bo-cd">${item.cooldown}</span></td>
      <td style="padding:12px"><div class="bo-note">${item.note}</div></td>
      </tr>`).join('') : `<tr><td colspan="5" style="padding:18px;text-align:center;background:white;color:#60708a">Ничего не найдено</td></tr>`}
      </table></div>`;
    }

    function oldBoPageTable(){
      return `
      <tr style="background:#1d67c1;color:white">
      <th style="padding:12px;text-align:left">Пункт БО</th>
      <th style="padding:12px;text-align:left">Задание</th>
      <th style="padding:12px;text-align:center">Баллы</th>
      <th style="padding:12px;text-align:center">КД</th>
      <th style="padding:12px;text-align:left">Примечание</th>
      </tr>
      ${state.boList.map(item=>`
      <tr style="border-bottom:1px solid #dce5f0;background:white">
      <td style="padding:12px;font-weight:800">${item.id}</td>
      <td style="padding:12px">${item.task}</td>
      <td style="padding:12px;text-align:center;font-weight:900;color:#1269d3">${item.points}</td>
      <td style="padding:12px;text-align:center">${item.cooldown}</td>
      <td style="padding:12px">${item.note}</td>
      </tr>`).join('')}
      </table>
      </div></div>`
    }

    function render(){
      if(!state.user)return loginScreen();
      let content=
      state.tab==='orgs' ? orgCards() :
      state.tab==='cabinet' ? cabinetPage() :
      state.tab==='request' ? requestPage() :
      state.tab==='exchange' ? exchangePage() :
      state.tab==='bo' ? boPage() :
      state.tab==='staffApps' ? staffApplicationsPage() :
      state.tab==='dev' ? developerPage() :
      adminPage();
      app.innerHTML=`<div class="app">${topbar()}${content}</div>`;
      if(state.tab==='bo') renderBoTable();
    }
    render();
  </script>
</body>
</html>
